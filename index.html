<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <title>Devine-Moi Pro</title>
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #ff8c00;
            --danger: #ff4444;
            --success: #4CAF50;
            --card-bg: rgba(255,255,255,.12);
            --card-border: rgba(255,255,255,.18);
            --card-shadow: 0 8px 32px rgba(0,0,0,.18), 0 2px 8px rgba(0,0,0,.1);
            --btn-bg: rgba(255,255,255,.15);
            --btn-border: rgba(255,255,255,.25);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: .3s cubic-bezier(.4,0,.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            background-size: 300% 300%;
            animation: gradientShift 8s ease infinite;
            transition: none;
        }
        body.setup-screen { background-image: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #667eea); }
        body.playing-screen { background-image: linear-gradient(135deg, #1e3c72, #2a5298, #4a77d4, #1e3c72); }
        body.scores-screen { background-image: linear-gradient(135deg, #f093fb, #f5576c, #ffd700, #f093fb); }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { max-width: 420px; margin: 0 auto; padding: 20px; min-height: 100vh; }

        /* ── Screen transitions ── */
        .screen { display:none; }
        .screen.active { display:block; animation: screenIn .5s cubic-bezier(.4,0,.2,1) both; }
        .screen.exit-left { animation: screenOutLeft .35s cubic-bezier(.4,0,.2,1) both; }
        .screen.exit-right { animation: screenOutRight .35s cubic-bezier(.4,0,.2,1) both; }
        @keyframes screenIn { from { opacity:0; transform:translateY(30px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes screenOutLeft { to { opacity:0; transform:translateX(-40px) scale(.95); } }
        @keyframes screenOutRight { to { opacity:0; transform:translateX(40px) scale(.95); } }

        /* ── Stagger entrance for cards ── */
        .card { opacity: 0; animation: cardIn .5s cubic-bezier(.4,0,.2,1) both; }
        .screen.active .card:nth-child(1) { animation-delay: .05s; }
        .screen.active .card:nth-child(2) { animation-delay: .12s; }
        .screen.active .card:nth-child(3) { animation-delay: .19s; }
        .screen.active .card:nth-child(4) { animation-delay: .26s; }
        .screen.active .card:nth-child(5) { animation-delay: .33s; }
        @keyframes cardIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        @keyframes pulse { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.06); opacity:.7; } }
        @keyframes crownBounce { 0%,100%{ transform:translateY(0) rotate(-5deg); } 50%{ transform:translateY(-6px) rotate(5deg); } }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Header ── */
        .header { text-align:center; margin-bottom:25px; }
        .logo { font-size:3.5rem; margin-bottom:8px; filter:drop-shadow(0 4px 12px rgba(0,0,0,.3)); }
        .title { font-size:2.4rem; font-weight:800; background:linear-gradient(45deg,var(--gold),var(--gold-dark)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; letter-spacing:-0.5px; }
        .subtitle { opacity:.9; font-size:.95rem; }
        .version { background:rgba(255,255,255,.2); backdrop-filter:blur(8px); border-radius:20px; padding:4px 14px; font-size:.75rem; display:inline-block; margin-top:8px; }

        /* ── Cards ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: var(--card-shadow);
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .card:active { transform: scale(.985); }
        .card h3 { display:flex; align-items:center; gap:10px; margin-bottom:12px; font-weight:700; font-size:1rem; }

        /* ── Inputs ── */
        .input-group { display:flex; gap:8px; margin-bottom:10px; align-items:center; transition: all .3s; }
        .input-group.removing { animation: slideOutRight .3s cubic-bezier(.4,0,.2,1) both; }
        .input-group.adding { animation: slideInLeft .3s cubic-bezier(.4,0,.2,1) both; }
        @keyframes slideInLeft { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
        @keyframes slideOutRight { to { opacity:0; transform:translateX(20px); height:0; margin:0; padding:0; overflow:hidden; } }
        .input-group input {
            flex:1; background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.2);
            border-radius:var(--radius-sm); padding:12px 14px; color:white; font-weight:500; font-size:1rem;
            transition: border-color .3s, background .3s, box-shadow .3s;
        }
        .input-group input::placeholder { color:rgba(255,255,255,.5); }
        .input-group input:focus { outline:none; border-color:var(--gold); background:rgba(255,255,255,.2); box-shadow:0 0 0 3px rgba(255,215,0,.2); }

        /* ── Buttons ── */
        .btn {
            position: relative;
            overflow: hidden;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn:hover { background:rgba(255,255,255,.25); }
        .btn:active { transform:scale(.96); }
        .btn .ripple {
            position:absolute; border-radius:50%; background:rgba(255,255,255,.35);
            transform:scale(0); animation:rippleEffect .6s ease-out;
            pointer-events:none;
        }
        @keyframes rippleEffect { to { transform:scale(4); opacity:0; } }
        .btn-primary { background:linear-gradient(45deg,var(--gold),var(--gold-dark)); color:#4a148c; font-size:1.1rem; padding:16px 24px; width:100%; margin-top:10px; font-weight:700; box-shadow:0 4px 20px rgba(255,215,0,.4); }
        .btn-primary:hover { box-shadow:0 6px 28px rgba(255,215,0,.5); }
        .btn-primary:active { transform:scale(.97); }
        .btn-remove { background:rgba(220,20,60,.4); padding:12px; width:44px; height:44px; flex-shrink:0; }
        .btn-add { border:2px dashed rgba(255,255,255,.35); padding:14px; width:100%; background:transparent; }

        /* ── Mode tabs & grid ── */
        .mode-tabs { display:flex; gap:4px; margin-bottom:12px; background:rgba(0,0,0,.15); border-radius:var(--radius-sm); padding:4px; }
        .mode-tab {
            flex:1; padding:10px 8px; text-align:center; border-radius:10px; font-size:.85rem;
            font-weight:600; cursor:pointer; transition:all .3s; background:transparent; border:none; color:rgba(255,255,255,.6);
        }
        .mode-tab.active { background:rgba(255,255,255,.2); color:white; box-shadow:0 2px 8px rgba(0,0,0,.15); }
        .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:240px; overflow-y:auto; scroll-behavior:smooth; }
        .mode-grid::-webkit-scrollbar { width:4px; }
        .mode-grid::-webkit-scrollbar-thumb { background:rgba(255,255,255,.3); border-radius:4px; }
        .mode-item {
            text-align:center; padding:12px 8px; border-radius:var(--radius-sm); font-size:.85rem;
            cursor:pointer; transition:all .25s cubic-bezier(.4,0,.2,1); background:rgba(255,255,255,.08);
        }
        .mode-item:active { transform:scale(.95); }
        .mode-item.selected {
            background:linear-gradient(45deg,var(--gold),var(--gold-dark)); color:#4a148c;
            transform:scale(1.03); box-shadow:0 4px 16px rgba(255,215,0,.35);
        }
        .mode-item .emoji { font-size:1.5rem; display:block; margin-bottom:4px; }

        /* ── Timer settings ── */
        .timer-settings { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .timer-value { font-size:1.8rem; font-weight:bold; min-width:80px; text-align:center; }
        .timer-btn { width:44px; height:44px; border-radius:50%; font-size:1.3rem; }

        /* ── Words per round ── */
        .words-per-round { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
        .words-per-round .btn { min-width:60px; padding:12px 10px; font-size:.9rem; }
        .words-per-round .btn.selected { background:linear-gradient(45deg,var(--gold),var(--gold-dark)); color:#4a148c; box-shadow:0 4px 16px rgba(255,215,0,.3); }

        /* ── Timer infinite button ── */
        .timer-infinite-btn { margin-top:12px; width:100%; padding:12px; font-size:.95rem; }
        .timer-infinite-btn.active { background:linear-gradient(45deg,var(--gold),var(--gold-dark)); color:#4a148c; }

        /* ── Game header ── */
        .game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:8px; }
        .round-badge { background:rgba(255,255,255,.2); backdrop-filter:blur(8px); padding:6px 14px; border-radius:20px; font-weight:600; font-size:.9rem; }
        .mode-badge { background:linear-gradient(45deg,var(--gold),var(--gold-dark)); color:#4a148c; padding:6px 14px; border-radius:20px; font-weight:700; font-size:.85rem; box-shadow:0 2px 8px rgba(255,215,0,.3); }
        .progress-badge { background:rgba(76,175,80,.5); backdrop-filter:blur(8px); padding:6px 14px; border-radius:20px; font-weight:600; font-size:.9rem; }

        /* ── SVG Timer ── */
        .timer-display { text-align:center; margin-bottom:20px; }
        .timer-svg-wrap { position:relative; width:120px; height:120px; margin:0 auto 12px; }
        .timer-svg { width:120px; height:120px; transform:rotate(-90deg); }
        .timer-svg-bg { fill:none; stroke:rgba(255,255,255,.15); stroke-width:6; }
        .timer-svg-progress { fill:none; stroke:var(--success); stroke-width:6; stroke-linecap:round; transition:stroke .5s, stroke-dashoffset .3s linear; }
        .timer-svg-progress.warning { stroke:#ffab00; }
        .timer-svg-progress.critical { stroke:var(--danger); }
        .timer-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:2.4rem; font-weight:800; text-shadow:0 2px 8px rgba(0,0,0,.3);
        }
        .timer-text.critical { color:var(--danger); animation:pulse .5s infinite; }
        .timer-text.infinite { font-size:2.8rem; }
        .timer-controls { display:flex; justify-content:center; gap:10px; }
        .timer-controls .btn { width:50px; height:50px; border-radius:50%; font-size:1.2rem; }

        /* ── Word card ── */
        .word-card {
            background:rgba(255,255,255,.15); backdrop-filter:blur(16px);
            border-radius:24px; padding:25px; text-align:center; margin-bottom:20px;
            box-shadow:0 8px 32px rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.15);
            perspective:1000px;
        }
        .word-inner { transition:transform .5s cubic-bezier(.4,0,.2,1); transform-style:preserve-3d; }
        .word-inner.flip { animation:flipIn .5s cubic-bezier(.4,0,.2,1) both; }
        @keyframes flipIn {
            0% { transform:rotateX(90deg) scale(.8); opacity:0; }
            100% { transform:rotateX(0deg) scale(1); opacity:1; }
        }
        .current-word { font-size:2.2rem; font-weight:800; margin-bottom:20px; letter-spacing:1px; word-break:break-word; text-shadow:0 2px 12px rgba(0,0,0,.2); }
        .hints-container { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
        .hint-badge { background:linear-gradient(45deg,var(--gold),var(--gold-dark)); color:#4a148c; padding:8px 14px; border-radius:20px; font-weight:700; font-size:.9rem; box-shadow:0 2px 8px rgba(255,215,0,.3); }
        .forbidden-label { color:#ff6b6b; font-size:.85rem; margin-bottom:10px; font-weight:700; }
        .forbidden-badge { background:rgba(220,20,60,.5); color:white; padding:8px 14px; border-radius:20px; font-weight:600; font-size:.9rem; }

        /* ── Players grid ── */
        .players-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
        .player-btn { padding:14px 10px; text-align:center; border-radius:var(--radius-sm); font-weight:600; font-size:.9rem; transition:all .2s; }
        .player-btn:active { transform:scale(.93); }
        .player-btn .score { font-size:1.3rem; display:block; margin-top:4px; }

        /* ── Action buttons ── */
        .action-buttons { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .action-buttons .btn { padding:14px; }
        .btn-skip { background:rgba(255,152,0,.5); }
        .btn-next { background:rgba(76,175,80,.5); }
        .btn-scores { grid-column:span 2; background:rgba(156,39,176,.5); }

        /* ── Scores screen ── */
        .scores-header { text-align:center; margin-bottom:25px; }
        .scores-header h2 { font-size:2rem; margin-bottom:8px; font-weight:800; }
        .podium { margin-bottom:20px; }
        .podium-item {
            display:flex; align-items:center; gap:15px; padding:15px;
            background:rgba(255,255,255,.12); backdrop-filter:blur(8px);
            border-radius:16px; margin-bottom:10px;
            opacity:0; animation:podiumIn .5s cubic-bezier(.4,0,.2,1) both;
            box-shadow:0 4px 16px rgba(0,0,0,.1);
        }
        .podium-item:nth-child(1) { animation-delay:.15s; }
        .podium-item:nth-child(2) { animation-delay:.3s; }
        .podium-item:nth-child(3) { animation-delay:.45s; }
        .podium-item:nth-child(4) { animation-delay:.6s; }
        .podium-item:nth-child(5) { animation-delay:.75s; }
        .podium-item:nth-child(6) { animation-delay:.9s; }
        .podium-item:nth-child(7) { animation-delay:1.05s; }
        .podium-item:nth-child(8) { animation-delay:1.2s; }
        @keyframes podiumIn { from { opacity:0; transform:translateX(-30px) scale(.95); } to { opacity:1; transform:translateX(0) scale(1); } }
        .podium-item.first { background:linear-gradient(45deg,rgba(255,215,0,.3),rgba(255,140,0,.3)); border:2px solid rgba(255,215,0,.5); box-shadow:0 4px 24px rgba(255,215,0,.25); }
        .podium-rank { font-size:2rem; width:50px; text-align:center; }
        .podium-info { flex:1; }
        .podium-name { font-weight:700; font-size:1.1rem; display:flex; align-items:center; gap:8px; }
        .crown { animation:crownBounce 1s infinite; display:inline-block; font-size:1.3rem; }
        .podium-score { font-size:1.8rem; font-weight:800; }

        .stats-card { background:var(--card-bg); backdrop-filter:blur(16px); border-radius:16px; padding:15px; margin-bottom:20px; box-shadow:var(--card-shadow); border:1px solid var(--card-border); }
        .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; text-align:center; }
        .stat-item .value { font-size:1.8rem; font-weight:800; }
        .stat-item .label { font-size:.85rem; opacity:.8; }

        .scores-actions { display:flex; flex-direction:column; gap:10px; }
        .btn-continue { background:linear-gradient(45deg,#4CAF50,#8BC34A); color:white; font-weight:700; box-shadow:0 4px 16px rgba(76,175,80,.35); }
        .btn-new-game { background:rgba(255,255,255,.2); }

        /* ── Loading ── */
        .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:200px; gap:15px; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }

        /* ── Offline banner ── */
        .offline-banner { position:fixed; top:0; left:0; right:0; background:linear-gradient(90deg,#ff5722,#e64a19); color:white; text-align:center; padding:10px; font-size:.85rem; font-weight:600; z-index:1000; display:none; box-shadow:0 2px 12px rgba(0,0,0,.3); }
        .offline-banner.show { display:block; animation:slideDown .3s ease; }
        @keyframes slideDown { from { transform:translateY(-100%); } to { transform:translateY(0); } }

        /* ── Countdown overlay ── */
        .countdown-overlay {
            position:fixed; inset:0; z-index:2000;
            display:flex; align-items:center; justify-content:center;
            background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
        }
        .countdown-number {
            font-size:8rem; font-weight:900; color:white;
            text-shadow:0 0 40px rgba(255,215,0,.6), 0 0 80px rgba(255,215,0,.3);
            animation:countPop .7s cubic-bezier(.4,0,.2,1) both;
        }
        .countdown-go {
            font-size:5rem; font-weight:900;
            background:linear-gradient(45deg,var(--gold),var(--gold-dark));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation:countPop .5s cubic-bezier(.4,0,.2,1) both;
        }
        @keyframes countPop {
            0% { transform:scale(2.5); opacity:0; }
            50% { transform:scale(.9); opacity:1; }
            70% { transform:scale(1.05); }
            100% { transform:scale(1); opacity:1; }
        }

        /* ── Toast ── */
        .toast-container { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:3000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast {
            background:rgba(30,30,30,.92); backdrop-filter:blur(12px); color:white;
            padding:12px 22px; border-radius:var(--radius-sm); font-weight:600; font-size:.95rem;
            box-shadow:0 8px 32px rgba(0,0,0,.4); white-space:nowrap;
            animation:toastIn .4s cubic-bezier(.4,0,.2,1) both;
            border-left:4px solid var(--gold);
        }
        .toast.error { border-left-color:var(--danger); }
        .toast.success { border-left-color:var(--success); }
        .toast.out { animation:toastOut .3s cubic-bezier(.4,0,.2,1) both; }
        @keyframes toastIn { from { opacity:0; transform:translateY(-20px) scale(.9); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-20px) scale(.9); } }

        /* ── Score popup ── */
        .score-popup {
            position:fixed; z-index:1500;
            font-size:2rem; font-weight:900; color:var(--gold);
            text-shadow:0 2px 12px rgba(0,0,0,.5);
            pointer-events:none;
            animation:floatUp 1s cubic-bezier(.4,0,.2,1) both;
        }
        @keyframes floatUp {
            0% { opacity:1; transform:translateY(0) scale(1); }
            100% { opacity:0; transform:translateY(-80px) scale(1.3); }
        }

        /* ── Confetti canvas ── */
        #confettiCanvas {
            position:fixed; inset:0; z-index:1800; pointer-events:none;
        }
    </style>
</head>
<body class="setup-screen">
    <div class="offline-banner" id="offlineBanner">Mode hors-ligne</div>
    <div class="toast-container" id="toastContainer"></div>
    <canvas id="confettiCanvas"></canvas>

    <div class="container">
        <!-- ═══ SETUP SCREEN ═══ -->
        <div class="screen active" id="setupScreen">
            <div class="header">
                <div class="logo">🎯</div>
                <h1 class="title">Devine-Moi Pro</h1>
                <p class="subtitle">Qui sera le meilleur devineur ?</p>
                <span class="version">v3.0</span>
            </div>
            <div class="card">
                <h3>👥 Joueurs</h3>
                <div id="playersContainer"></div>
                <button class="btn btn-add" onclick="addPlayer()">➕ Ajouter</button>
            </div>
            <div class="card">
                <h3>🎮 Mode</h3>
                <div class="mode-tabs" id="modeTabs"></div>
                <div class="mode-grid" id="modeGrid"></div>
            </div>
            <div class="card">
                <h3>🎯 Mots / round</h3>
                <div class="words-per-round" id="wordsPerRoundContainer"></div>
            </div>
            <div class="card">
                <h3>⏱️ Timer</h3>
                <div class="timer-settings">
                    <button class="btn timer-btn" onclick="adjustTimer(-15)">−</button>
                    <div class="timer-value" id="timerValue">60s</div>
                    <button class="btn timer-btn" onclick="adjustTimer(15)">+</button>
                </div>
                <button class="btn timer-infinite-btn" id="infiniteBtn" onclick="toggleInfiniteTimer()">∞ Sans limite de temps</button>
            </div>
            <button class="btn btn-primary" onclick="startGame()">🚀 Lancer la partie !</button>
        </div>

        <!-- ═══ PLAYING SCREEN ═══ -->
        <div class="screen" id="playingScreen">
            <div class="game-header">
                <span class="round-badge" id="roundBadge">Round 1</span>
                <span class="mode-badge" id="modeBadge">Général</span>
                <span class="progress-badge" id="progressBadge">Mot 1/5</span>
            </div>
            <div class="timer-display">
                <div class="timer-svg-wrap">
                    <svg class="timer-svg" viewBox="0 0 120 120">
                        <circle class="timer-svg-bg" cx="60" cy="60" r="52"/>
                        <circle class="timer-svg-progress" id="timerProgress" cx="60" cy="60" r="52"/>
                    </svg>
                    <div class="timer-text" id="timerText">60</div>
                </div>
                <div class="timer-controls">
                    <button class="btn" id="playPauseBtn" onclick="toggleTimer()">⏸️</button>
                    <button class="btn" onclick="resetTimer()">🔄</button>
                </div>
            </div>
            <div class="word-card">
                <div class="loading" id="wordLoading">
                    <div class="spinner"></div>
                    <p>Chargement...</p>
                </div>
                <div id="wordContent" style="display:none">
                    <div class="word-inner" id="wordInner">
                        <div class="current-word" id="currentWord">MOT</div>
                        <div class="forbidden-label" id="forbiddenLabel" style="display:none">🚫 Mots interdits :</div>

    // ── Ripple effect on all buttons ──

            ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

    // ══════════════════════════════════════

    function initModeGrid() {

    // ══════════════════════════════════════

    function selectWordsPerRound(n) {

    // ══════════════════════════════════════
    // PLAYERS
    // ══════════════════════════════════════
    function addPlayer() {
        if (G.players.length >= 8) return;

    }

    function removePlayer(i) {
        if (G.players.length <= 2) return;
        const group = document.querySelectorAll('#playersContainer .input-group')[i];
        if (group) {
            group.classList.add('removing');
            group.addEventListener('animationend', () => {
                G.players.splice(i, 1);
                renderPlayers(false);
            });
        } else {
            G.players.splice(i, 1);
            renderPlayers(false);
        }
    }

    function updatePlayerName(i, n) { G.players[i] = n; }

    function renderPlayers(animateNew) {
        const html = G.players.map((n, i) =>
            `<div class="input-group ${animateNew && i === G.players.length-1 ? 'adding' : ''}">
                <input type="text" placeholder="Joueur ${i+1}" value="${n}" onchange="updatePlayerName(${i},this.value)">
                ${G.players.length > 2 ? `<button class="btn btn-remove" onclick="removePlayer(${i})">✕</button>` : ''}
            </div>`

        document.getElementById('playersContainer').innerHTML = html;

    // ══════════════════════════════════════
    // TIMER SETTINGS
    // ══════════════════════════════════════
    function adjustTimer(d) {
        if (G.isInfiniteTimer) return; // don't adjust when infinite
        G.timer = Math.max(15, Math.min(300, G.timer + d));
        updateTimerDisplay();
    }

    function toggleInfiniteTimer() {
        G.isInfiniteTimer = !G.isInfiniteTimer;
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const btn = document.getElementById('infiniteBtn');
        if (G.isInfiniteTimer) {
            document.getElementById('timerValue').textContent = '∞';
            btn.classList.add('active');

            document.getElementById('timerValue').textContent = `${G.timer}s`;
            btn.classList.remove('active');
        }

    // ══════════════════════════════════════
    // COUNTDOWN OVERLAY
    // ══════════════════════════════════════
    function showCountdown() {
        return new Promise(resolve => {
            const overlay = document.createElement('div');
            overlay.className = 'countdown-overlay';
            document.body.appendChild(overlay);
            const steps = ['3', '2', '1', 'GO !'];
            let i = 0;
            function next() {
                if (i >= steps.length) {
                    overlay.style.opacity = '0';
                    overlay.style.transition = 'opacity .3s';
                    setTimeout(() => { overlay.remove(); resolve(); }, 300);
                    return;
                }
                overlay.innerHTML = `<div class="${i < 3 ? 'countdown-number' : 'countdown-go'}">${steps[i]}</div>`;
                i++;
                setTimeout(next, i <= 3 ? 700 : 500);
            }
            next();
        });
    }

    // ══════════════════════════════════════
    // CONFETTI
    // ══════════════════════════════════════
    function launchConfetti(duration = 2500) {
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#ffd700','#ff8c00','#f5576c','#667eea','#4CAF50','#ff4444','#e040fb','#00bcd4'];

        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                vx: (Math.random() - .5) * 4,
                vy: Math.random() * 4 + 2,
                rot: Math.random() * 360,
                rotV: (Math.random() - .5) * 10,
                opacity: 1
            });
        }

        const start = Date.now();
        function draw() {
            const elapsed = Date.now() - start;
            if (elapsed > duration) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const fadeStart = duration * 0.7;
            const globalAlpha = elapsed > fadeStart ? 1 - (elapsed - fadeStart) / (duration - fadeStart) : 1;

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                p.rot += p.rotV;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.globalAlpha = globalAlpha * p.opacity;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                ctx.restore();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    // ══════════════════════════════════════
    // SCORE POPUP
    // ══════════════════════════════════════
    function showScorePopup(playerName) {
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.textContent = '+1';
        popup.style.left = '50%';

    // ══════════════════════════════════════
    // SUPABASE FETCH
    // ══════════════════════════════════════
    async function fetchWords(cat, lim = 50) {
        try {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/words?category=eq.${cat}&select=*&limit=${lim}`, {
                headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
            });
            if (!r.ok) throw new Error();
            return (await r.json()).map(i => ({ word: i.word, hints: i.hints, forbidden: i.forbidden || null }));
        } catch(e) {
            console.error(e);
            showToast('Erreur de chargement des mots', 'error');
            return [];
        }
    }

    // ══════════════════════════════════════
    // GAME FLOW
    // ══════════════════════════════════════
    async function startGame() {
        const vp = G.players.filter(p => p.trim());
        if (vp.length < 2) { showToast('Il faut au moins 2 joueurs !', 'error'); return; }
        G.players = vp;
        G.scores = {};
        vp.forEach(p => G.scores[p] = 0);
        G.round = 1;
        G.totalWordsGuessed = 0;
        G.usedWords = [];
        G.currentWordIndex = 0;
        G.timeLeft = G.timer;

        showScreen('playing');
        await showCountdown();
        await loadWords();
        await getNewWord();
        renderPlayersGrid();
    }

    async function loadWords() {
        document.getElementById('wordLoading').style.display = 'flex';
        document.getElementById('wordContent').style.display = 'none';
        G.wordsCache = await fetchWords(G.gameMode, 100);
        G.wordsCache.sort(() => Math.random() - .5);
    }

    async function getNewWord() {
        document.getElementById('wordLoading').style.display = 'flex';
        document.getElementById('wordContent').style.display = 'none';
        let av = G.wordsCache.filter(w => !G.usedWords.includes(w.word));
        if (!av.length) {
            await loadWords();
            av = G.wordsCache.filter(w => !G.usedWords.includes(w.word));
            // If still no words after reload, stop the game
            if (!av.length) {
                showToast('Aucun mot disponible pour ce mode', 'error');
                document.getElementById('wordLoading').style.display = 'none';
                showScores();
                return;
            }
        }
        const w = av[Math.floor(Math.random() * av.length)];
        G.currentWord = w;
        G.usedWords.push(w.word);
        displayWord(w);
        updateProgress();
        resetTimer();
    }

    function displayWord(w) {
        document.getElementById('wordLoading').style.display = 'none';
        document.getElementById('wordContent').style.display = 'block';

        // Flip animation
        const inner = document.getElementById('wordInner');
        inner.classList.remove('flip');
        void inner.offsetWidth; // trigger reflow
        inner.classList.add('flip');

        document.getElementById('currentWord').textContent = w.word;
        const h = document.getElementById('hintsContainer');
        const f = document.getElementById('forbiddenLabel');
        if (w.forbidden && w.forbidden.length) {
            f.style.display = 'block';
            h.innerHTML = w.forbidden.map(x => `<span class="forbidden-badge">${x}</span>`).join('');
        } else {
            f.style.display = 'none';
            h.innerHTML = w.hints.map(x => `<span class="hint-badge">${x}</span>`).join('');
        }
    }

    function updateProgress() {
        document.getElementById('progressBadge').textContent = `Mot ${G.currentWordIndex + 1}/${G.wordsPerRound}`;
        document.getElementById('roundBadge').textContent = `Round ${G.round}`;
        const m = MODES.find(x => x.id === G.gameMode);
        document.getElementById('modeBadge').textContent = m ? `${m.emoji} ${m.name}` : '';
    }

    function renderPlayersGrid() {
        document.getElementById('playersGrid').innerHTML = G.players.map(p =>
            `<button class="btn player-btn" onclick="scorePoint('${p.replace(/'/g, "\\'")}')">${p}<span class="score">${G.scores[p]} pts</span></button>`
        ).join('');
    }

    function scorePoint(p) {
        G.scores[p]++;
        G.totalWordsGuessed++;
        showScorePopup(p);
        renderPlayersGrid();
        nextWord();
    }

    async function nextWord() {
        stopTimer();
        G.currentWordIndex++;
        if (G.currentWordIndex >= G.wordsPerRound) {
            launchConfetti();
            setTimeout(() => showScores(), 400);
        } else {
            await getNewWord();
        }
    }

    function skipWord() { nextWord(); }

    // ══════════════════════════════════════
    // TIMER
    // ══════════════════════════════════════
    function startTimer() {
        if (G.isInfiniteTimer) return;
        G.isTimerActive = true;
        document.getElementById('playPauseBtn').textContent = '⏸️';
        G.timerInterval = setInterval(() => {
            G.timeLeft--;
            updateTimerCircle();
            if (G.timeLeft <= 0) { stopTimer(); nextWord(); }
        }, 1000);
    }

    function stopTimer() {
        G.isTimerActive = false;
        clearInterval(G.timerInterval);
        document.getElementById('playPauseBtn').textContent = '▶️';
    }

    function toggleTimer() {
        if (G.isInfiniteTimer) return;
        G.isTimerActive ? stopTimer() : startTimer();
    }

    function resetTimer() {
        stopTimer();
        G.timeLeft = G.timer;
        updateTimerCircle();
        startTimer();
    }

    function updateTimerCircle() {
        const prog = document.getElementById('timerProgress');
        const text = document.getElementById('timerText');

        if (G.isInfiniteTimer) {
            text.textContent = '∞';
            text.className = 'timer-text infinite';
            prog.style.strokeDashoffset = '0';
            prog.className = 'timer-svg-progress';
            return;
        }

        const ratio = G.timeLeft / G.timer;
        const offset = TIMER_CIRCUMFERENCE * (1 - ratio);
        prog.style.strokeDashoffset = offset;

        text.textContent = G.timeLeft;

        // Color states
        if (G.timeLeft <= 10) {
            prog.className = 'timer-svg-progress critical';
            text.className = 'timer-text critical';
        } else if (ratio <= 0.35) {
            prog.className = 'timer-svg-progress warning';
            text.className = 'timer-text';
        } else {
            prog.className = 'timer-svg-progress';
            text.className = 'timer-text';
        }
    }

    // ══════════════════════════════════════
    // SCORES
    // ══════════════════════════════════════
    function showScores() {
        stopTimer();
        showScreen('scores');
        renderScores();
        setTimeout(() => launchConfetti(3000), 300);
    }

    function renderScores() {
        const sp = Object.entries(G.scores).sort((a, b) => b[1] - a[1]);
        const medals = ['🥇','🥈','🥉'];
        document.getElementById('podium').innerHTML = sp.map(([n, s], i) =>
            `<div class="podium-item ${i===0?'first':''}">
                <div class="podium-rank">${medals[i]||(i+1)}</div>
                <div class="podium-info">
                    <div class="podium-name">${n}${i===0?'<span class="crown">👑</span>':''}</div>
                </div>
                <div class="podium-score">${s}</div>
            </div>`
        ).join('');

        document.getElementById('statRound').textContent = G.round;
        document.getElementById('statWords').textContent = G.totalWordsGuessed;
        document.getElementById('nextRound').textContent = G.round + 1;

        // Animate score count-up
        document.querySelectorAll('.podium-score').forEach(el => {
            const target = parseInt(el.textContent);
            if (target === 0) return;
            el.textContent = '0';
            let current = 0;
            const step = Math.max(1, Math.floor(target / 20));
            const interval = setInterval(() => {
                current = Math.min(current + step, target);
                el.textContent = current;
                if (current >= target) clearInterval(interval);
            }, 40);
        });
    }

    // ══════════════════════════════════════
    // CONTINUE / NEW GAME
    // ══════════════════════════════════════
    async function continueGame() {
        G.round++;
        G.currentWordIndex = 0;
        showScreen('playing');
        await showCountdown();
        await getNewWord();
        renderPlayersGrid();
    }

    function newGame() {
        stopTimer();
        G.scores = {};
        G.round = 1;
        G.totalWordsGuessed = 0;
        G.usedWords = [];
        G.currentWordIndex = 0;
        G.wordsCache = [];
        showScreen('setup');
        // Re-init setup UI after screen is visible
        setTimeout(() => {
            renderPlayers(false);
            initModeTabs();
            initModeGrid();
            updateTimerDisplay();
        }, 150);
    }

    // ══════════════════════════════════════
    // SCREEN TRANSITIONS
    // ══════════════════════════════════════
    function showScreen(n) {
        // Immediately hide all screens and remove lingering animation classes
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active', 'exit-left', 'exit-right');
            s.style.display = 'none';
        });
        // Show the target screen
        const next = document.getElementById(n + 'Screen');
        next.style.display = 'block';
        // Force reflow then add active class for entrance animation
        void next.offsetWidth;
        next.classList.add('active');
        document.body.className = n + '-screen';
    }
    </script>
